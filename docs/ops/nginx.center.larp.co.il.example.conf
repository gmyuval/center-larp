server {
    listen 80;
    server_name center.larp.co.il;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name center.larp.co.il;

    ssl_certificate /etc/letsencrypt/live/center.larp.co.il/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/center.larp.co.il/privkey.pem;

    client_max_body_size 10m;

    location /static/ {
        alias /srv/center-larp/static/;
        access_log off;
        expires 7d;
    }

    location / {
        proxy_pass http://center-larp-web:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 60s;
    }
}
