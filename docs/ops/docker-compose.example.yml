# Production: uses DigitalOcean managed PostgreSQL (db-postgresql-fra1-01).
# No local db service needed — DATABASE_URL in .env points to the managed cluster.
services:
  web:
    build:
      context: ..
      dockerfile: ops/Dockerfile.example
    env_file:
      - .env.example
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60"
    ports:
      - "8000:8000"

  worker:
    build:
      context: ..
      dockerfile: ops/Dockerfile.example
    env_file:
      - .env.example
    command: >
      sh -c "python manage.py run_jobs"
