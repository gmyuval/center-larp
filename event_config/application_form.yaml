version: 2
title: "שאלון הרשמה ללארפ בשערי זרים"
submit_button: "שליחת הרשמה"

fields:
  - key: full_name
    type: text
    label: "מה השם שלך?"
    required: true
    max_length: 120

  - key: display_name
    type: text
    label: "שם שיופיע ברשימה הציבורית"
    required: true
    max_length: 120
    help_text: "יכול להיות השם המלא או כינוי לבחירתך"

  - key: email
    type: email
    label: "אימייל"
    required: true
    max_length: 254

  - key: phone
    type: tel
    label: "מה הטלפון שלך?"
    required: true
    max_length: 32

  - key: faction_preference
    type: select
    label: "לאיזה סיעה אתה מעוניין להשתייך?"
    required: true
    choices:
      - "דיבוקים"
      - "ג׳ינים"
      - "טכנומאגים"
      - "פיות"

  - key: faction_second_choice
    type: select
    label: "אם הסיעה הראשונה מלאה, מה הסיעה השנייה שתבחר בה?"
    required: false
    choices:
      - "דיבוקים"
      - "ג׳ינים"
      - "טכנומאגים"
      - "פיות"

  - key: dietary_restrictions
    type: text
    label: "מחיר הכרטיס יכלול גם ארוחה ושתייה, האם יש הגבלה כלשהי שעלינו להכיר?"
    required: false
    max_length: 500

  - key: additional_notes
    type: textarea
    label: "דבר מה נוסף?"
    required: false
    rows: 4

spam_protection:
  honeypot_field: "website"
