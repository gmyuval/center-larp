factions:
  - glyph: "ד"
    name: "דיבוקים"
    description: "רוח שהשתלטה על גוף אנושי וחיה בו כאורח שלא הוזמן ולא עוזב. הם יכולים להיות עתיקים מאוד, אבל העולם שמסביבם הוא לא הבית שלהם. גוף שאול, זמן שאול, וזיכרון שלא תמיד ברור למי הוא שייך."
  - glyph: "ג׳"
    name: "ג׳ינים"
    description: "חיים בין בני אדם ומכירים את שני העולמות. השושלות שלהם עתיקות, אבל הם צעירים. הם לא שרידים מהעבר, הם בני זמננו, עם כל מה שזה אומר: מורכבים, עייפים לפעמים, ויודעים בדיוק מה שווה המקום הזה."
  - glyph: "ט"
    name: "טכנומאגים"
    description: "יודעים בדיוק מה הם עושים — ועושים את זה מתוך חזון. הם לא התחילו עם מסכים: הם התחילו עם מלאכה, עם נמל, עם ידיים בבטון. הקסם שלהם עלה מלמטה. יש להם יותר עבר משנהוג לחשוב, אבל הם חושבים על העתיד."
  - glyph: "פ"
    name: "פיות"
    description: "יכולים להיראות כמו אנשים לזמן מוגבל...אבל הם לא. הם בני סיפור וחלום, שהגיעו עם גלי העלייה האירופאית ומנסים ללמוד לחיות אגדות של קייב בחוף גורדון. המרחק בין שם לכאן לא תמיד נסגר."

