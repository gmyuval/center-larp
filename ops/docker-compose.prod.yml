# Production compose — uses pre-built images from DigitalOcean Container Registry.
# DATABASE_URL in .env points to DO managed PostgreSQL — no local db service.
#
# Usage:
#   IMAGE_TAG=latest docker compose -f ops/docker-compose.prod.yml up -d

services:
  web:
    image: registry.digitalocean.com/praxiscode/center-larp:${IMAGE_TAG:-latest}
    env_file:
      - .env
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             python manage.py createsuperuser --noinput 2>/dev/null || true &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60"
    expose:
      - "8000"
    volumes:
      - static_files:/app/staticfiles
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  worker:
    image: registry.digitalocean.com/praxiscode/center-larp:${IMAGE_TAG:-latest}
    env_file:
      - .env
    command: python manage.py run_jobs
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.center.larp.co.il.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/srv/center-larp/static:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: ""
    command: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --quiet;
               sleep 12h;
             done"
    restart: unless-stopped

volumes:
  static_files:
  letsencrypt:
  certbot_webroot:
