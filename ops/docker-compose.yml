# Production: uses DigitalOcean managed PostgreSQL (db-postgresql-fra1-01).
# DATABASE_URL in .env points to the managed cluster — no local db service needed.
services:
  web:
    build:
      context: ..
      dockerfile: ops/Dockerfile
    env_file:
      - ../.env
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: ..
      dockerfile: ops/Dockerfile
    env_file:
      - ../.env
    command: >
      sh -c "python manage.py run_jobs"
    depends_on:
      web:
        condition: service_healthy
