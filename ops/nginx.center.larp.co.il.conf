# ACME challenge for Let's Encrypt (must work before SSL certs exist)
server {
    listen 80;
    server_name center.larp.co.il;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name center.larp.co.il;

    ssl_certificate /etc/letsencrypt/live/center.larp.co.il/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/center.larp.co.il/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    client_max_body_size 10m;

    location /static/ {
        alias /srv/center-larp/static/;
        access_log off;
        expires 7d;
    }

    location / {
        proxy_pass http://web:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 60s;
    }
}
