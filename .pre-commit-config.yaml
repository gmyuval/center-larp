repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy type check
        entry: bash -c 'DJANGO_SECRET_KEY=lint-only-not-for-production mypy .'
        language: system
        types: [python]
        pass_filenames: false
