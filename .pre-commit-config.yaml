repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy type check
        entry: bash -c 'DJANGO_SECRET_KEY=lint-only-not-for-production mypy .'
        language: system
        types: [python]
        pass_filenames: false

      - id: pip-compile
        name: pip-compile requirements
        entry: bash -c 'pip-compile pyproject.toml -o requirements.txt --quiet --strip-extras && pip-compile pyproject.toml --extra dev -o requirements-dev.txt --quiet --strip-extras && git add requirements.txt requirements-dev.txt'
        language: system
        files: ^pyproject\.toml$
        pass_filenames: false
