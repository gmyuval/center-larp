{% load static %}
<header class="site-header">
  <div class="site-header__inner">
    <span class="site-wordmark">CENTER LARP</span>
    <div class="theme-toggle" role="group" aria-label="Theme mode">
      <button class="theme-toggle__button" type="button" data-theme-choice="auto" aria-pressed="true">אוטומטי</button>
      <button class="theme-toggle__button" type="button" data-theme-choice="day" aria-pressed="false">יום</button>
      <button class="theme-toggle__button" type="button" data-theme-choice="night" aria-pressed="false">לילה</button>
    </div>
  </div>
</header>
